apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: harbor-infra
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/gwg313/homelab-gitops
    targetRevision: HEAD
    path: harbor-infra
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: harbor
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
