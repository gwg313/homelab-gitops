apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: minio
  namespace: argocd
spec:
  destination:
    namespace: minio
    server: https://kubernetes.default.svc
  project: default
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: minio
    targetRevision: 13.6.3
    helm:
      releaseName: minio
      values: |
        auth:
          existingSecret: minio-auth

        ingress:
          enabled: false

        service:
          type: ClusterIP
          ports:
            api: 9000
            console: 9001

        persistence:
          existingClaim: minio-data
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
