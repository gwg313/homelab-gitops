apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: quay-config
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/gwg313/homelab-gitops
    targetRevision: main
    path: quay
  destination:
    server: https://kubernetes.default.svc
    namespace: quay-enterprise
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
