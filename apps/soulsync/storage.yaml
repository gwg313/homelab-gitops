apiVersion: v1
kind: PersistentVolume
metadata:
  name: slskd-music-pv
spec:
  capacity:
    storage: 10Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteMany # Elevated for SoulSync
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual
  nfs:
    path: /mnt/tank/media/music
    server: truenas.local.gwg313.xyz
  claimRef:
    namespace: slskd
    name: slskd-music
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: slskd-music
  namespace: slskd
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: manual
  volumeName: slskd-music-pv
  resources:
    requests:
      storage: 10Gi
---
# New PVC for SoulSync's internal database/state
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: soulsync-config
  namespace: slskd
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
