apiVersion: v1
kind: PersistentVolume
metadata:
  name: quay-redis-pv
spec:
  capacity:
    storage: 2Gi
  accessModes:
    - ReadWriteOnce
  storageClassName: quay-storage
  iscsi:
    targetPortal: truenas.local.gwg313.xyz
    iqn: iqn.2005-10.org.freenas.ctl:quay-redis
    lun: 1
    fsType: ext4
    readOnly: false
    chapAuthDiscovery: true
    chapAuthSession: true
    secretRef:
      name: quay-iscsi-auth
      namespace: quay-enterprise
  persistentVolumeReclaimPolicy: Retain
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: quay-redis
  namespace: quay-enterprise
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: quay-storage
  volumeName: quay-redis-pv
  resources:
    requests:
      storage: 2Gi
