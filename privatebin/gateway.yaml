apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: privatebin-gateway
  namespace: privatebin
spec:
  selector:
    istio: ingressgateway
  servers:
  - port:
      number: 443
      name: https
      protocol: HTTPS
    tls:
      mode: SIMPLE
      credentialName: privatebin-tls
    hosts:
    - privatebin.local.gwg313.xyz
