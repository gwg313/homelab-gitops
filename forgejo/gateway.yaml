apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: forgejo-gateway
spec:
  selector:
    istio: gateway
  servers:
    - port:
        number: 443
        name: https
        protocol: HTTPS
      tls:
        mode: SIMPLE
        credentialName: forgejo-cert
      hosts:
        - forgejo.local.gwg313.xyz
